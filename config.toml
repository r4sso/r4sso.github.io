baseURL = 'https://r4sso.my'
languageCode = 'en'
title = 'r4sso.my'
theme = ["myTheme"]
enableRobotsTXT = true

# Pagination Settings
[pagination]
  pagerSize = 5
paginate = 5 

# Formatting and Permalinks
[permalinks]
  posts = "/:year/:month/:title/"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

[outputFormats.RSS]
  mediatype = "application/rss+xml"
  baseName = "rss"

# Markdown and Highlighting
[markup]
  [markup.highlight]
    codeFences = true
    lineNoStart = 1
    lineNumbersInTable = false
    noClasses = false
    pygmentsUseClasses = true
    pygmentsCodefences = true

  [markup.goldmark.renderer]
    hardWraps = true

  [markup.goldmark.parser]
    attribute = true 

  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

# Site Parameters
[params]
  title = "Hello World!"
  description = "My personal website, blog and notes of r4sso"
  logo = "/images/logo.svg"
  favicon = "/images/logo.svg"
  tableOfContents = true
  github = "r4sso"
  instagram = "mfterm"
  mail = "0xr4sso@proton.me"
  githubEditURL = "https://github.com/r4sso/r4sso.github.io/blob/main/content/"

