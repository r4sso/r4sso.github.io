{{ define "main" }}
<div class="flex flex-col justify-center px-4">
    <div class="prose dark:prose-invert  text-justify max-w-3xl ">
        <div class="relative">
            <h1>{{ .Title }}</h1>
            <div class="text-sm leading-normal">
                <img class="float-none h-auto w-40 rounded md:float-right md:mx-2 md:-mt-12" src="{{ .Params.thumb }}" title="{{ .Params.avatar_title }}">
                {{ .Content }}
            </div>
        </div>
    </div>
</div>
{{ end }}
