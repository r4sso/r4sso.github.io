{{ define "main" }}
<div class="m-4 flex justify-center pt-12">
    <div class="w-full max-w-2xl">
   <!-- Top-right link styled as button -->
    <div class="flex justify-start mb-6">
      <a href="/posts" class="inline-flex items-center gap-2 rounded-md shadow-2xl px-4 py-2 text-black dark:text-white dark:post-card-dark post-card hover:ring-2 focus-ring-4 rounded-lg">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0ZM3.75 12h.007v.008H3.75V12Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm-.375 5.25h.007v.008H3.75v-.008Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
        </svg>
        <span class="ml-4">Card View</span>
      </a>
    </div>

        <!-- <h1 class="text-3xl font-bold leading-tight">{{ .Title }}</h1> -->
        {{ range where .Site.RegularPages "Section" "posts" }}
        <ul class="list-disc">
            <li class="ml-6 text-gray-800 dark:text-gray-300">
                <a class="rounded-lg p-1 text-sm hover:bg-gray-700/10 dark:hover:bg-gray-300/10" href="{{ .Permalink }}"><b>{{.Date.Format "02/01/2006"}} -</b> <span class="text-sm font-semibold text-blue-600">{{ .Title }}</span></a>
            </li>
        </ul>
        {{ end }}
    </div>
</div>
{{ end }}
