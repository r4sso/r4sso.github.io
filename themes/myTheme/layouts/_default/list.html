{{ define "main" }}
<div class="m-4 flex justify-center pt-12">
  <div class="w-full max-w-2xl">
  
    <!-- Top-right link styled as button -->
    <div class="flex justify-start mb-6">
      <a href="/posts/all" class="inline-flex items-center gap-2 rounded-md shadow-2xl px-4 py-2 text-black dark:text-white dark:post-card-dark post-card hover:ring-2 focus-ring-4 rounded-lg">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0ZM3.75 12h.007v.008H3.75V12Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm-.375 5.25h.007v.008H3.75v-.008Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
        </svg>
        <span class="ml-4">All Posts</span>
      </a>
    </div>

    <!-- Post list -->
    <div class="rounded-lg">
      {{ range (.Paginate .RegularPages).Pages }}
      <a href="{{ .RelPermalink }}" class="block">
        <div class="post-card dark:post-card-dark mb-5 translate-y-1 rounded-md p-6 shadow-2xl shadow-slate-700/10 transition duration-150 hover:shadow-xl active:scale-95 dark:text-white dark:hover:shadow-sky-700/10">
          <h2 class="mb-4 text-2xl font-bold">{{ .Title }}</h2>
          {{ partial "metadata.html" . }}
          <p class="mt-4 text-sm text-gray-600 dark:text-gray-300">{{ .Summary }}</p>
        </div>
      </a>
      {{ end }}
    </div>

    <!-- Pagination -->
    {{ partial "pagination.html" . }}
  </div>
</div>
{{ end }}
