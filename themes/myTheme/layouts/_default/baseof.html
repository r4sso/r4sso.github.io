<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
{{ partial "head.html" . }}
<body class="bg-cus flex min-h-screen flex-col pt-16 antialiased">
    <header>
        {{ partial "header.html" . }}
    </header>
    
    <main id="main" class="mx-auto w-full max-w-3xl px-4 sm:px-8">
        {{ block "main" . }}{{ end }}
        {{ partial "scroll-top.html" . }} 
        {{ partial "footer.html" . }}
    </main>
    
    {{ partial "script.html" . }}
</body>
</html>
