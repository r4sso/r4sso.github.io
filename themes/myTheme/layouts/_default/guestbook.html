{{ define "main" }}
<div class="py-2">
    <article class="">
        <div class="prose dark:prose-invert post-card dark:post-card-dark mx-auto max-w-3xl rounded-lg p-6 shadow-2xl shadow-slate-700/10">
            <h1 class="text-2xl font-bold mb-2">{{ .Title }}</h1>
            <div class="prose-h1:text-2xl prose-a:text-blue-600 text-sm leading-normal">
                {{ .Content }}
            </div>
            <div id="giscus-container" class="mt-4"></div>
        </div>
    </article>
</div>

<script>
    var giscusTheme = localStorage.getItem("color-theme"); // Use the "color-theme" cookie
      var giscusAttributes = {
        src: "https://giscus.app/client.js",
        "data-repo": "r4sso/r4sso.github.io",
        "data-repo-id": "MDEwOlJlcG9zaXRvcnkzMDAyOTQzNzM=",
        "data-category": "Announcements",
        "data-category-id": "DIC_kwDOEeYg5c4CX55V",
        "data-mapping": "pathname",
        "data-reactions-enabled": "0",
        "data-input-position": "top",
        "data-emit-metadata": "0",
        "data-strict": "0",
        "data-theme": giscusTheme,
        "data-lang": "en",
        "data-loading": "lazy",
        crossorigin: "anonymous",
        async: "",
      };
    
      var giscusScript = document.createElement("script");
      Object.entries(giscusAttributes).forEach(([key, value]) => giscusScript.setAttribute(key, value));
      document.getElementById("giscus-container").appendChild(giscusScript);
</script>

{{ end }}
