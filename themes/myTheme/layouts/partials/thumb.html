{{- if or (in .Params.thumb "http") (in .Params.thumb ".gif") -}}
  {{ $src := .Page.Resources.GetMatch (.Params.thumb | safeURL) }}
  <figure class="-my-px max-w-fit3 mx-auto">
    <a href="{{ .Params.thumb }}">
      <picture>
        <img src="{{ .Params.thumb }}" alt="{{ .Params.alt }}" decoding="async" width="900" height="900">
      </picture>
    </a>
    {{ with .Params.alt }}<figcaption>- {{ . | markdownify }}</figcaption>{{ end }}
  </figure>
{{ else }}
  {{ $src := .Page.Resources.GetMatch (.Params.thumb | safeURL) }}

  {{ if $src }}
  <figure class="-my-px max-w-fit3 mx-auto">
    {{ $data := newScratch }}

    {{ if gt $src.Width 1100 }}
      {{ $data.Set "webp" ($src.Resize "960x webp q90") }}
      {{ $data.Set "fallback" ($src.Resize "960x q90") }}
    {{ else }}
      {{ $data.Set "webp" ($src.Resize (printf "%dx%d webp q90" $src.Width $src.Height)) }}
      {{ $data.Set "fallback" ($src.Resize (printf "%dx%d q90" $src.Width $src.Height)) }}
    {{ end }}

    {{ $webp := $data.Get "webp" }}
    {{ $fallback := $data.Get "fallback" }}

    <a href="{{ $src.RelPermalink }}">
      <picture>
        <source srcset="{{ $webp.RelPermalink }}" type="image/webp">
        <img src="{{ $fallback.RelPermalink }}" alt="{{ .Params.alt }}" decoding="async" width="{{ $src.Width }}" height="{{ $src.Height }}" />
      </picture>
    </a>
    {{ with .Params.alt }}<figcaption>- {{ . | markdownify }}</figcaption>{{ end }}
  </figure>
  {{ end }}
{{- end -}}
