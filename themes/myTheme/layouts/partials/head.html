<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ if .IsPage }}{{ .Summary }}{{ else }}{{ .Site.Params.description }}{{ end }}{{ end }}">
    {{ partialCached "head/css.html" . }}
    {{ partialCached "head/js.html" . }}
    {{ if .Params.math }}{{ partial "helpers/katex.html" . }}{{ end }}
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ printf "%s | %s" .Title site.Title }}{{ end }}</title>
    <link rel="icon" href="data:image/svg+xml;base64,{{ readFile .Site.Params.logo | base64Encode }}" type="image/svg+xml">
</head>
